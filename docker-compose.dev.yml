version: "3.9"

# Development overrides — hot reload, debug ports, verbose logging
services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    environment:
      - DEBUG=true
      - APP_ENV=development

  worker:
    command: celery -A app.core.celery_app worker --loglevel=debug --concurrency=1
    environment:
      - DEBUG=true

  frontend:
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
